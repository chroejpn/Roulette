<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーレット - プロファイル機能付き</title>
    <!-- CSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
    <!-- faviconを読み込む -->
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    
    <div class="container">
        <!-- プロファイル管理エリア -->
        <div class="profile-manager">
            <h3>プロファイルの保存・読み込み</h3>
            <select id="profileSelect">
                <option value="">-- 保存済みから選択 --</option>
            </select>
            <button id="loadBtn">読み込む</button>
            <button id="deleteBtn" class="delete">削除</button>
            <br>
            <input type="text" id="profileName" placeholder="新しいプロファイル名">
            <button id="saveBtn">現在の項目を保存</button>
        </div>

        <!-- ルーレットと項目編集エリア -->
        <div class="controls">
            <h3>項目の編集</h3>
            <p style="font-size: 12px; color: #666; margin: 0;">「項目名:割合」で重みを設定できます（例: A:1）<br>改行で区切ってください．</p>
            <textarea id="itemInput" rows="6">A:1&#10;B:2&#10;C:3&#10;D（割合なしは1）</textarea>
            <br>
            <button id="updateBtn">ルーレットを更新</button>
        </div>

        <div>
            <canvas id="roulette" width="300" height="300"></canvas>
            <br>
            <!-- 直接書いていたスタイル（style="..."）をCSSクラスに変更しています -->
            <button id="spinBtn" class="spin-btn">回す！</button>
            <div id="result"></div>
        </div>
    </div>

    <!-- JavaScriptファイルを読み込む（画面の要素が読み込まれた後に実行するため一番下に配置） -->
    <script src="script.js"></script>
</body>
</html>
