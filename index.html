<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーレット - プロファイル機能付き</title>
    <!-- CSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
    <!-- faviconを読み込む -->
    <link rel="icon" href="favicon.png" type="image/png">
</head>
<body>
    
<div style="text-align: right; width: 80%; max-width: 500px; margin: 0 auto 10px;">
        <label for="langSelect" style="font-size: 20px; vertical-align: middle; margin-right: 5px; cursor: pointer;" title="Language / 言語">🌐</label>
        <select id="langSelect" style="padding: 5px; border-radius: 4px; vertical-align: middle; cursor: pointer;">
            <option value="ja">日本語</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="container">
        <div class="profile-manager">
            <h3 id="titleProfile">プロファイルの保存・読み込み</h3>
            <select id="profileSelect">
                <option value="">-- 保存済みから選択 --</option>
            </select>
            <button id="loadBtn">読み込む</button>
            <button id="deleteBtn" class="delete">削除</button>
            <br>
            <input type="text" id="profileName" placeholder="新しいプロファイル名">
            <button id="saveBtn">現在の項目を保存</button>
        </div>

        <div class="controls">
            <h3 id="titleEdit">項目の編集</h3>
            <p id="descEdit" style="font-size: 12px; color: #666; margin: 0;">「項目名:割合」で重みを設定できます（例: A:1）<br>改行で区切ってください．</p>
            <textarea id="itemInput" rows="6">A:1&#10;B:2&#10;C:3&#10;D:1</textarea>
            <br>
            <button id="updateBtn">ルーレットを更新</button>
        </div>

        <div>
            <canvas id="roulette" width="300" height="300"></canvas>
            <br>
            <button id="spinBtn" class="spin-btn">回す！</button>
            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
